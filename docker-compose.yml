services:
  postgres:
    image: postgres:16-alpine
    container_name: cc-financial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cc_financial
      POSTGRES_PASSWORD: cc_financial_dev
      POSTGRES_DB: cc_financial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc_financial -d cc_financial"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
